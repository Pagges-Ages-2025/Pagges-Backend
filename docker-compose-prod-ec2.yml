version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ABC # Change this in production
      POSTGRES_DB: pagges
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    networks:
      - pagges-network

  pagges-backend:
    command: >
      sh -c "npx prisma migrate deploy && ts-node prisma/seed-prod.ts && node dist/src/main.js"
    image: 029236691098.dkr.ecr.us-east-2.amazonaws.com/pagges:pagges-backend-15240244275
    container_name: pagges-backend-prod
    environment:
      PORT: 80
      DATABASE_URL: ABC
      JWT_SECRET: ABC
      GOOGLE_API_KEY: ABC
    ports:
      - "80:80"
    depends_on:
      - postgres
    restart: always
    networks:
      - pagges-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--storage.tsdb.retention.time=7d"
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=pagges-2025
      - GF_SECURITY_ADMIN_PASSWORD=pagges-2025
    volumes:
      - grafana_storage:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  prometheus_data:
  grafana_storage:
  postgres-data:

networks:
  pagges-network:
    driver: bridge
